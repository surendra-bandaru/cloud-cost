global:
  imagePullSecrets:
    - name: acr-secret

# Backend
backend:
  enabled: true
  replicaCount: 1
  image:
    registry: konaaidevacr.azurecr.io
    repository: billing-backend
    tag: main
    pullPolicy: Always
  service:
    type: LoadBalancer
    port: 4000
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NODE_ENV: production
    PORT: "4000"
    JWT_SECRET: "billing-platform-jwt-secret-2024"
    JWT_EXPIRES_IN: "7d"
    DATABASE_URL: "postgresql://billing_user:billing_pass@billing-platform-postgresql:5432/billing_db"

# Frontend
frontend:
  enabled: true
  replicaCount: 1
  image:
    registry: konaaidevacr.azurecr.io
    repository: billing-frontend
    tag: main
    pullPolicy: Always
  service:
    type: LoadBalancer
    port: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  env:
    NEXT_PUBLIC_API_URL: "http://40.80.78.179:4000/api"

# PostgreSQL
postgresql:
  enabled: true
  auth:
    username: billing_user
    password: "billing_pass"
    database: billing_db
  primary:
    persistence:
      storageClass: "managed-premium"
      size: 10Gi

# Redis
redis:
  enabled: true

# Ingress disabled - using LoadBalancer
ingress:
  enabled: false

serviceAccount:
  create: false
