name: Build and Push to ACR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/**'
      - '.github/workflows/build-and-push.yml'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Backend image
      run: |
        IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/billing-backend
        TAG=${GITHUB_REF_NAME}-${GITHUB_SHA::7}

        docker build \
          -f ./apps/backend/Dockerfile.prod \
          --build-arg NODE_ENV=production \
          -t $IMAGE:$TAG \
          -t $IMAGE:${GITHUB_REF_NAME} \
          ./apps/backend

        docker push $IMAGE:$TAG
        docker push $IMAGE:${GITHUB_REF_NAME}

        echo "✅ Backend pushed: $IMAGE:$TAG"

  build-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Frontend image
      run: |
        IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/billing-frontend
        TAG=${GITHUB_REF_NAME}-${GITHUB_SHA::7}

        docker build \
          -f ./apps/frontend/Dockerfile.prod \
          --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
          -t $IMAGE:$TAG \
          -t $IMAGE:${GITHUB_REF_NAME} \
          ./apps/frontend

        docker push $IMAGE:$TAG
        docker push $IMAGE:${GITHUB_REF_NAME}

        echo "✅ Frontend pushed: $IMAGE:$TAG"
